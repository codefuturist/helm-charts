---
repos:
  # Usage: pre-commit run autoupdate --hook-stage manual
  - repo: local
    hooks:
      - id: autoupdate
        name: autoupdate
        entry: pre-commit autoupdate
        language: system
        always_run: true
        pass_filenames: false
        stages: [manual]

  - repo: https://github.com/norwoodj/helm-docs
    rev: v1.14.2
    hooks:
      - id: helm-docs-built
        args:
          - --chart-search-root=charts
          - --values-file=values.yaml
          - --template-files=../templates/_helpers.gotmpl
          - --template-files=../templates/README.md.gotmpl
          - --sort-values-order=file
          - --documentation-strict-mode
          - --documentation-strict-ignore-absent-regex=.*\.enabled
          - --documentation-strict-ignore-absent-regex=.*\.image\..*

  - repo: local
    hooks:
      - id: sync-chart-docs
        name: Sync Chart Documentation
        description: Automatically sync charts with MkDocs documentation
        entry: uv run python scripts/sync-chart-docs.py
        language: system
        files: ^(charts/.*/(Chart\.yaml|values\.yaml)|mkdocs\.yml)$
        pass_filenames: false
        stages: [pre-commit]

      - id: copier-recopy
        name: Copier Recopy Managed Charts
        description: Regenerate Copier-managed charts when template changes
        entry: ./scripts/hooks/copier-recopy.sh
        language: system
        files: ^templates/chart-copier/
        pass_filenames: false
        stages: [pre-commit]

      - id: sync-boilerplate
        name: Sync Chart Boilerplate
        description: Sync canonical boilerplate files across all charts
        entry: uv run python scripts/hooks/sync-boilerplate.py
        language: system
        files: ^(templates/chart-template/|charts/.*/(Chart\.yaml|\.helmignore))$
        pass_filenames: false
        stages: [pre-commit]

      - id: chart-drift-check
        name: Chart Drift Check
        description: Audit charts for consistency (warnings only)
        entry: uv run python scripts/chart-drift-check.py
        language: system
        files: ^charts/
        pass_filenames: false
        stages: [manual]
