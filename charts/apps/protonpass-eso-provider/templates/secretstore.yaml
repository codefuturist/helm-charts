{{- if .Values.externalSecretsOperator.createSecretStore }}
apiVersion: external-secrets.io/v1beta1
kind: {{ .Values.externalSecretsOperator.namespaced | ternary "SecretStore" "ClusterSecretStore" }}
metadata:
  name: {{ .Values.externalSecretsOperator.secretStore.name }}
  {{- if .Values.externalSecretsOperator.namespaced }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "protonpass-eso-provider.labels" . | nindent 4 }}
    {{- with .Values.externalSecretsOperator.secretStore.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.externalSecretsOperator.secretStore.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  provider:
    webhook:
      url: "http://{{ include "protonpass-eso-provider.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/api/v1/secret"
      method: POST
      headers:
        Content-Type:
          - "application/json"
        Authorization:
          - "Bearer {{ `{{ .token }}` }}"
      secrets:
        - name: token
          secretRef:
            name: {{ include "protonpass-eso-provider.apiTokenSecretName" . }}
            {{- if .Values.externalSecretsOperator.namespaced }}
            namespace: {{ .Release.Namespace }}
            {{- end }}
            key: {{ .Values.api.existingSecret.key | default "token" }}
      body: |
        {
          "itemId": "{{ `{{ .remoteRef.key }}` }}",
          "field": "{{ `{{ .remoteRef.property | default "password" }}` }}",
          "vault": "{{ `{{ .remoteRef.metadata.vault | default "" }}` }}"
        }
      result:
        jsonPath: "$.value"
      timeout: {{ .Values.externalSecretsOperator.timeout | default "10s" }}
{{- end }}
