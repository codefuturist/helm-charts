# Example: ExternalSecret using the Proton Pass provider
#
# Prerequisites:
#   - protonpass-eso-provider chart installed
#   - ClusterSecretStore "protonpass" created
#   - Items exist in your Proton Pass vault
#
# Item naming convention:
#   In Proton Pass, create items with clear titles.
#   The "key" field maps to the item title (or item ID).
#   The "property" field maps to the field name within the item.
#
# Common field names:
#   - password    (login item password)
#   - username    (login item username)
#   - email       (login item email)
#   - url         (login item URL)
#   - note        (secure note content)
#   - totp        (TOTP secret)
#   - <custom>    (any custom field name you've added)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-app-secrets
  namespace: my-app
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: protonpass
    kind: ClusterSecretStore
  target:
    name: my-app-secrets
    template:
      type: Opaque
  data:
    # Login item fields
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: "MyApp Database"
        property: "password"

    - secretKey: DATABASE_USERNAME
      remoteRef:
        key: "MyApp Database"
        property: "username"

    # Custom fields
    - secretKey: API_KEY
      remoteRef:
        key: "API Keys"
        property: "myapp_api_key"

    - secretKey: STRIPE_SECRET
      remoteRef:
        key: "Payment Gateway"
        property: "secret_key"

    # Secure note
    - secretKey: TLS_CERT
      remoteRef:
        key: "TLS Certificate"
        property: "note"
---
# Example: Fetch all fields from a single item
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: my-app-database
  namespace: my-app
spec:
  refreshInterval: "10m"
  secretStoreRef:
    name: protonpass
    kind: ClusterSecretStore
  data:
    - secretKey: host
      remoteRef:
        key: "MyApp Database"
        property: "url"
    - secretKey: username
      remoteRef:
        key: "MyApp Database"
        property: "username"
    - secretKey: password
      remoteRef:
        key: "MyApp Database"
        property: "password"
